<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60">
  <foreignObject width="800" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes typing {
          from { width: 0 }
          to { width: 47ch }
        }
        @keyframes blink {
          0%, 100% { border-color: transparent }
          50% { border-color: currentColor }
        }
        @keyframes glow {
          0%, 100% {
            text-shadow:
              0 0 8px rgba(56, 182, 255, 0.4),
              0 0 20px rgba(56, 182, 255, 0.15);
          }
          50% {
            text-shadow:
              0 0 16px rgba(56, 182, 255, 0.6),
              0 0 40px rgba(56, 182, 255, 0.3),
              0 0 60px rgba(56, 182, 255, 0.15);
          }
        }
        .wrap {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 60px;
          overflow: hidden;
        }
        .line {
          font-family: "Courier New", Courier, monospace;
          font-size: 20px;
          font-weight: bold;
          color: #58a6ff;
          white-space: nowrap;
          overflow: hidden;
          border-right: 2px solid;
          width: 0;
          animation:
            typing 3s steps(47) 0.5s forwards,
            blink 0.8s step-end infinite,
            glow 4s ease-in-out 3.5s infinite;
        }
        @media (prefers-color-scheme: light) {
          .line {
            color: #0550ae;
            animation:
              typing 3s steps(47) 0.5s forwards,
              blink 0.8s step-end infinite;
          }
        }
      </style>
      <div class="wrap">
        <span class="line">Agent System | Trading | Quant | Infrastructure</span>
      </div>
    </div>
  </foreignObject>
</svg>
